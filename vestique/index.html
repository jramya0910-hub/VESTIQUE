<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vestique – AI-Powered Bridal Fashion</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="theme-light">

  <!-- App Root -->
  <div id="app">

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <span class="logo-v">V</span>
        <span class="logo-text">estique</span>
      </div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <p class="loading-tagline">Discover Your Perfect Bridal Look</p>
    </div>

    <!-- Auth Container -->
    <div id="auth-container" class="auth-container hidden"></div>

    <!-- Main App (post-login) -->
    <div id="main-app" class="main-app hidden">

      <!-- Top Header -->
      <header id="top-header" class="top-header"></header>

      <!-- Page Container -->
      <main id="page-container" class="page-container"></main>

      <!-- Bottom Navigation -->
      <nav id="bottom-nav" class="bottom-nav"></nav>

    </div>

  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-container" class="modal-container hidden"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/auth.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/search.js"></script>
  <script src="js/pages/dress-detail.js"></script>
  <script src="js/pages/customize.js"></script>
  <script src="js/pages/ar-studio.js"></script>
  <script src="js/pages/wishlist.js"></script>
  <script src="js/pages/cart.js"></script>
  <script src="js/pages/checkout.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/designer-dashboard.js"></script>
  <script src="js/pages/community.js"></script>
  <script src="js/pages/notifications.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
